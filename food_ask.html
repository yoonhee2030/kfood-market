<html lang="ko">
<head>

<title>K-Food Market · K푸드 수출 시장분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090e;--s1:#0f1118;--s2:#161921;--s3:#0b0d13;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);--tx:#e8ecf5;--mt:#5a6a88;--ac:#f97316;--ac2:#fb923c;--gn:#22d3a8;--yw:#fbbf24;--rd:#f87171;--bl:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px;line-height:1.7;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;flex-shrink:0;border-bottom:1px solid var(--bd);background:var(--s3);}
.brand{display:flex;align-items:baseline;gap:8px;}
.bp{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--ac);}
.bd2c{color:var(--mt);font-size:11px;}
.bs{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.steps{display:flex;gap:5px;}
.sd{width:8px;height:8px;border-radius:50%;background:var(--bd2);transition:all 0.3s;}
.sd.done{background:var(--gn);}
.sd.active{background:var(--ac);width:20px;border-radius:4px;}
.chat{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}
.msg{display:flex;gap:10px;animation:up 0.3s ease;}
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.user{flex-direction:row-reverse;}
.av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px;}
.av.ai{background:linear-gradient(135deg,var(--ac),#ea580c);}
.av.user{background:var(--s2);border:1px solid var(--bd2);}
.bbl{max-width:75%;padding:13px 16px;border-radius:14px;font-size:13px;line-height:1.8;}
.msg.ai .bbl{background:var(--s1);border:1px solid var(--bd2);border-radius:4px 14px 14px 14px;}
.msg.user .bbl{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);border-radius:14px 4px 14px 14px;}
.bbl strong{color:var(--ac2);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;}
.cbtn{padding:10px 12px;border-radius:10px;cursor:pointer;background:var(--s2);border:1px solid var(--bd2);color:var(--mt);font-family:'Noto Sans KR',sans-serif;font-size:12px;transition:all 0.18s;text-align:left;display:flex;align-items:center;gap:7px;}
.cbtn:hover{border-color:rgba(249,115,22,0.4);color:var(--tx);background:rgba(249,115,22,0.05);}
.cbtn.sel{border-color:var(--ac);background:rgba(249,115,22,0.1);color:var(--ac2);}
.cbtn:disabled{opacity:0.35;cursor:not-allowed;}
.ci{font-size:15px;}
.cta{margin:4px 0;padding:14px 18px;border-radius:12px;background:linear-gradient(135deg,rgba(249,115,22,0.12),rgba(251,146,60,0.06));border:1px solid rgba(249,115,22,0.3);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.2s;}
.cta:hover{background:linear-gradient(135deg,rgba(249,115,22,0.2),rgba(251,146,60,0.1));transform:translateY(-1px);}
.cta-icon{font-size:22px;}
.cta-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--ac);}
.cta-sub{font-size:11px;color:var(--mt);}
.typing{display:flex;gap:4px;align-items:center;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--mt);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.ibar{padding:12px 16px;border-top:1px solid var(--bd);background:var(--s3);display:flex;gap:10px;align-items:flex-end;}
.iwrap{flex:1;background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:10px 14px;display:flex;align-items:center;transition:border-color .2s;}

.iwrap textarea{flex:1;background:transparent;border:none;color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:13px;resize:none;outline:none;max-height:100px;overflow-y:auto;line-height:1.6;}
.iwrap textarea::placeholder{color:var(--mt);opacity:.6;}
.sbtn{width:36px;height:36px;border-radius:10px;background:var(--ac);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s;flex-shrink:0;}
.sbtn:hover{opacity:.85;}
.sbtn svg{width:16px;height:16px;fill:#fff;}
/* 모달 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;}

.mhd{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bd);}

.msub{font-size:13px;color:var(--mt);}

.mcircle{width:78px;height:78px;border-radius:50%;border:3px solid var(--gn);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.mnum{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--gn);line-height:1;}
.mlbl{font-size:11px;color:var(--mt);}
.mvtitle{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--gn);margin-bottom:4px;}
.mvbody{font-size:13px;color:var(--mt);line-height:1.65;}
.msec{margin-bottom:14px;}
.msectitle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mt);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.msecbody{font-size:14px;color:var(--tx);line-height:1.75;background:var(--s2);border-radius:8px;padding:13px 15px;}
.mactions{display:flex;gap:8px;margin-top:16px;}
.mdl{flex:1;padding:12px;border-radius:10px;background:linear-gradient(135deg,var(--ac),#ea580c);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.mclose{padding:12px 16px;border-radius:10px;background:transparent;border:1px solid var(--bd2);color:var(--mt);font-family:'Syne',sans-serif;font-size:15px;cursor:pointer;}
/* 차트 */
.brow{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.btrack{height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.bfill{height:100%;border-radius:4px;}
/* 가격바 */
.pbar-wrap{position:relative;height:24px;border-radius:6px;margin:10px 0;overflow:visible;}
/* 테이블 */
.ctable{width:100%;border-collapse:collapse;font-size:13px;}
.ctable th{padding:7px 9px;text-align:left;font-size:11px;color:var(--mt);font-weight:600;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--bd);}
.ctable td{padding:8px 9px;border-bottom:1px solid var(--bd);}
.ctable tr:last-child td{border-bottom:none;}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:3px;}
.bg{background:rgba(34,211,168,.1);color:var(--gn);}
.br{background:rgba(248,113,113,.1);color:var(--rd);}
.mtags{display:flex;flex-wrap:wrap;gap:5px;}
.mtag{font-size:11px;padding:3px 9px;border-radius:3px;background:rgba(249,115,22,.08);color:var(--ac);border:1px solid rgba(249,115,22,.2);}
/* 로딩 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.spinner{width:44px;height:44px;border:3px solid rgba(249,115,22,.15);border-top-color:var(--ac);border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.stext{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mt);letter-spacing:.07em;}
@media(max-width:600px){.cgrid{grid-template-columns:1fr;}.bbl{max-width:88%;}.chat{padding:14px;}}
</style>

<script>
const PROXY = 'https://script.google.com/macros/s/AKfycbxaJlOYRXBbhKSCz0GJ41-Rhm07hT59EM9Cn0hSQgoD0RGumZDkz8vDO21hlTYVGFkYzA/exec';

// ── Google Sheets DB 설정
const SHEETS_CONFIG = {
  id: '',        // 스프레드시트 ID (관리자가 입력)
  apiKey: '',    // Google Cloud API 키 (관리자가 입력)
};

// Sheets에서 DEF 데이터 로드
async function loadFromSheets() {
  if (!SHEETS_CONFIG.id || !SHEETS_CONFIG.apiKey) return null;
  try {
    const base = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_CONFIG.id}/values`;
    const key = `?key=${SHEETS_CONFIG.apiKey}`;

    const [catRes, detRes] = await Promise.all([
      fetch(`${base}/categories${key}`),
      fetch(`${base}/details${key}`)
    ]);

    if (!catRes.ok || !detRes.ok) return null;
    const catData = await catRes.json();
    const detData = await detRes.json();

    const cats = catData.values || [];
    const dets = detData.values || [];
    const headers = cats[0] || [];
    const result = {};

    // categories 시트 파싱
    cats.slice(1).forEach(row => {
      const r = {};
      headers.forEach((h,i) => r[h] = row[i]||'');
      const ck = r.catKey;
      if (!ck) return;
      result[ck] = {
        score: parseInt(r.score)||80,
        pmin: parseFloat(r.pmin)||3,
        pmax: parseFloat(r.pmax)||20,
        psweet: parseFloat(r.psweet)||9,
        pcomment: {low:r.pcomment_low||'', mid:r.pcomment_mid||'', high:r.pcomment_high||''},
        radar: {
          '시장규모': parseInt(r.radar_시장규모)||7,
          '성장률': parseInt(r.radar_성장률)||7,
          'K푸드인지도': parseInt(r.radar_K푸드인지도)||7,
          '진입용이성': parseInt(r.radar_진입용이성)||7,
          '가격경쟁력': parseInt(r.radar_가격경쟁력)||7,
        },
        mktAnalysis: r.mktAnalysis||'',
        action: r.action||'KATI(global.at.or.kr)에서 수출업체 등록부터 시작하세요.',
        caution: r.caution||'현지 라벨링 규정을 사전 확인하세요.',
        scoreBreakdown: [],
        rnk: [],
        comp: [],
        catName: r.catName||ck,
        emoji: r.emoji||'🍽️',
      };
    });

    // details 시트 파싱
    dets.slice(1).forEach(row => {
      const [ck, type, ...keys] = row;
      if (!result[ck] || !type) return;
      const vals = keys.filter(Boolean);

      if (type === 'score') {
        result[ck].scoreBreakdown = vals.map(v => {
          const [label,score,max,basis] = v.split('|');
          return {label, score:parseInt(score)||0, max:parseInt(max)||10, basis:basis||''};
        });
      } else if (type === 'ranking') {
        result[ck].rnk = vals.map(v => {
          const [c,f,s,r] = v.split('|');
          return {c, f, s:parseInt(s)||70, r:r||''};
        });
      } else if (type === 'competitor') {
        result[ck].comp = vals.map(v => {
          const [n,p,st,wk,rating,reviews,detail,insight] = v.split('|');
          return {n,p,st,wk,rating,reviews,detail,insight};
        });
      }
    });

    return result;
  } catch(e) {
    console.log('Sheets 로드 실패, 로컬 DEF 사용:', e.message);
    return null;
  }
}

         {c:'일본',f:'🇯🇵',s:79,r:'K요리 관심 높음, 일본어 라벨 준비 필요'},

      {n:'기꼬만',p:'$6',st:'유통망·인지도',wk:'일본산·범용',note:'미국 간장 시장 1위',
       rating:'⭐4.8',reviews:'47,000+건',
       detail:'1917년 창업. 미국 전역 월마트·코스트코 입점. "Made in Japan" 이미지로 신뢰도 높음. 하지만 범용 간장이라 K-BBQ 특화 포지션은 없음.',

       rating:'⭐4.5',reviews:'2,800+건',

function getCatKey() {
  if (!st.cat) return 'sauce';
  if (st.cat.includes('장류')||st.cat.includes('소스')) return 'sauce';
  if (st.cat.includes('김')) return 'kim';
  if (st.cat.includes('라면')) return 'ramen';
  if (st.cat.includes('과자')) return 'snack';
  if (st.cat.includes('건강')) return 'health';
  if (st.cat.includes('수산')) return 'seafood';
  return 'beverage';
}
function getMktKey() {
  if (!st.mkt) return 'us';
  if (st.mkt.includes('미국')) return 'us';
  if (st.mkt.includes('일본')) return 'jp';
  if (st.mkt.includes('베트남')) return 'vn';
  if (st.mkt.includes('태국')) return 'th';
  if (st.mkt.includes('EU')) return 'eu';
  return 'us';
}

function md(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

function addMsg(role, html, choices) {
  document.querySelectorAll('.cbtn').forEach(b=>{ b.disabled=true; b.style.opacity='0.4'; b.style.cursor='not-allowed'; });
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  const av = document.createElement('div');
  av.className = 'av ' + role;
  av.textContent = role==='ai' ? '🍜' : '👤';

  const inner = document.createElement('div');
  inner.style.cssText = 'flex:1;min-width:0;';

  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  bbl.innerHTML = md(html);
  inner.appendChild(bbl);

  // 히스토리 선택 버튼 처리
  if (choices && role==='ai') {
    const grid = document.createElement('div');
    grid.className = 'cgrid';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cbtn';
      btn.innerHTML = `<span class="ci">${c.icon}</span><div><div style="font-weight:500;">${c.label}</div>${c.desc?`<div style="font-size:10px;color:var(--mt);">${c.desc}</div>`:''}</div>`;
      if (c.val === 'new' || c.val === 'history') {
        btn.onclick = () => { onHistoryChoice(c.val); };
      } else {
        btn.onclick = () => pick(c, btn);
      }
      grid.appendChild(btn);
    });
    inner.appendChild(grid);
  }

  wrap.appendChild(av);
  wrap.appendChild(inner);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  st.log.push({role, text: html});
}

function setStep(n) {
  for (let i=0;i<4;i++) {
    const d = document.getElementById('sd'+i);
    d.className = 'sd' + (i<n?' done':i===n?' active':'');
  }
}

function pick(c, btn) {
  btn.classList.add('sel');
  document.querySelectorAll('.cbtn').forEach(b=>{ b.disabled=true; b.style.opacity=b===btn?'1':'0.35'; b.style.cursor='not-allowed'; });
  addMsg('user', c.label);
  if (st.step===0) { st.cat=c.label; st.step=1; setStep(1); setTimeout(doMkt,500); }
  else if (st.step===1) { st.mkt=c.val==='unknown'?'아직 미정':c.label; st.step=2; setStep(2); setTimeout(doPrice,500); }
  else if (st.step===2) { st.price=c.val==='unk'?'미정':c.label; st.step=3; setStep(3); setTimeout(doPname,500); }
}

function sendFree() {
  const inp = document.getElementById('inp');
  const q = inp.value.trim();
  if (!q || st.typing) return;
  inp.value = '';
  inp.style.height = 'auto';

  // Step 3 → 제품명 수집
  if (st.step===3 && !st.pname) {
    st.pname = q;
    addMsg('user', q);
    st.step = 4; setStep(4);
    setTimeout(doPdetail, 400);
    return;
  }

  // Step 4 → 제품 특징 수집
  if (st.step===4 && !st.pdetail) {
    st.pdetail = q;
    addMsg('user', q);
    st.step = 5; setStep(4); // 스텝 인디케이터는 4 유지
    setTimeout(doFreeStart, 400);
    return;
  }

  addMsg('user', q);
  callAI(q);
}

async function callAI(q) {
  st.typing = true;
  showTyping();
  const hist = st.log.slice(-8).map(h=>`${h.role==='user'?'대표':'AI'}: ${h.text.replace(/<[^>]+>/g,'')}`).join('\n');
  const fullQ = hist ? `[대화]\n${hist}\n\n[질문]\n${q}` : q;
  const sys = `K푸드 수출 어드바이저. 수출 초보 대표와 대화. 3문장 이내, 전문용어 금지, 끝에 후속질문 1개.
제품 정보: ${st.pname||'미입력'} / ${st.pdetail||'특징 미입력'} / 카테고리: ${st.cat||''} / 목표시장: ${st.mkt||''} / 가격대: ${st.price||''}`;
  try {
    const res = await fetch(PROXY, {method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({question:fullQ,system:sys})});
    const data = await res.json();
    removeTyping();
    addMsg('ai', data.answer||'잠깐 오류가 났어요. 다시 질문해주세요.');
    const cnt = st.log.filter(h=>h.role==='user').length;
    if (cnt>=3 && st.pname) showCTA();
  } catch(e) {
    removeTyping();
    addMsg('ai', '연결이 잠깐 끊겼어요. 다시 말씀해주세요.');
  }
  st.typing = false;
}

## ⚠️ 언어 규칙 (매우 중요)
- 모든 텍스트 필드는 **반드시 한국어**로 작성.
- 검색 결과에 일본어·영어·중국어·베트남어·태국어가 있어도 **모두 한국어로 번역**해서 출력.
- 브랜드명("n")은 형식: "한국어 표기/번역 (원문)". 예: "기꼬만 간장 (キッコーマン醤油)", "기미 오가닉 (GimMe Organics)". 원문이 영문이면 한국어 표기를 앞에 붙이거나 영문만 써도 됨.
- "detail", "insight"는 100% 한국어 자연스러운 문장.

## ⚠️ 제품 요약 규칙 (summary 필드)
- 대표가 입력한 특징 원문에서 **핵심 키워드만 뽑아 한 줄로 요약**.
- 형식: 키워드를 "·"로 구분. 예: "500ml · 국내산 콩 · 저나트륨 · 무방부제 · 만능간장"
- 최대 6개 키워드, 전체 50자 이내. 군더더기 문장형 표현 금지. 명사·수치 위주.
- 입력이 비어있으면 빈 문자열("").

## 출력 형식
아래 JSON 객체만 반환. 다른 텍스트 없이.
{
  "summary": "내 제품 핵심 키워드 요약 (위 규칙대로)",
  "comps": [
    {
      "n": "한국어 브랜드명 (원문 브랜드명)",
      "p": "$가격",
      "rating": "⭐4.X",
      "reviews": "숫자+건",
      "st": "강점 한 단어 (한국어)",
      "wk": "약점 한 단어 (한국어)",
      "detail": "제품 설명 2문장 (한국어)",
      "insight": "우리 제품 대비 시사점 1문장 (한국어)",
      "imageQuery": "구글 이미지 검색용 영문 쿼리. 브랜드명+제품명+용량/규격+특징+amazon 포함. 예: GimMe Organics roasted seaweed snack 0.17oz sea salt amazon product"
    }
  ]
}`;

    const res = await fetch(PROXY, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({
        question: compPrompt,
        system: '아마존·쇼피 등 글로벌 마켓 조사 전문가. JSON 객체 형식으로만 답변. 다른 텍스트 절대 포함 금지. 모든 텍스트 필드는 반드시 한국어로 작성. 일본어·영어·중국어·태국어·베트남어가 있으면 한국어로 번역해서 출력. 브랜드명은 "한국어 표기 (원문)" 형식. summary 필드는 키워드를 "·"로 구분한 짧은 한 줄.'
      })
    });
    const data = await res.json();
    let raw = (data.answer||'').replace(/```json|```/g,'').trim();

    // 객체 형식 우선 시도 ({summary, comps}), 실패 시 배열 형식으로 폴백
    const objMatch = raw.match(/\{[\s\S]*\}/);
    const arrMatch = raw.match(/\[[\s\S]*\]/);
    let parsedSummary = '';
    if (objMatch) {
      try {
        const obj = JSON.parse(objMatch[0]);
        parsedSummary = (obj.summary||'').trim();
        if (Array.isArray(obj.comps)) aiComps = obj.comps;
      } catch(e) {
        if (arrMatch) { try { aiComps = JSON.parse(arrMatch[0]); } catch(e2){} }
      }
    } else if (arrMatch) {
      try { aiComps = JSON.parse(arrMatch[0]); } catch(e){}
    }
    window._productSummary = parsedSummary;

    // 경쟁사별 이미지 - 딥카피해서 전역에 저장
    if (aiComps && aiComps.length > 0) {
      window._imgComps = JSON.parse(JSON.stringify(aiComps));
      window._imgKey = serperKey;
    }

    // ── Step 3: Gemini로 전략 내러티브 생성 (요약·포지셔닝·로드맵)
    try {
      const ck2=getCatKey(), def2=DEF[ck2]||DEF.sauce;
      const compNames=(aiComps||[]).slice(0,3).map(c=>`${c.n} (${c.p})`).join(', ');
      const nPrompt=`K푸드 수출 전략을 아래 정보 기반으로 JSON으로 작성해줘. 모든 내용 반드시 한국어로.\n\n제품명: ${st.pname||st.cat}\n카테고리: ${st.cat}\n목표 시장: ${st.mkt}\n목표 가격: ${st.price}\n주요 경쟁사: ${compNames||'미확인'}\n시장 현황: ${def2.mktAnalysis||''}\n\n아래 JSON 객체만 반환. 다른 텍스트 없이:\n{\n  "summary": "제품명+시장+핵심 포지셔닝을 담은 한 문장 (40자 내외, 예: '만능간장은 미국 K-BBQ 열풍을 타고 $9~12 프리미엄 포지션으로 진입하면 차별화 가능해요.')",\n  "positioning": "주요 경쟁사 대비 차별화 포지셔닝 전략 한 줄 (구체적으로)",\n  "roadmap": {\n    "month1": "1개월 내 당장 해야 할 구체적 행동 한 문장",\n    "month3": "3개월 내 달성할 목표·행동 한 문장",\n    "month6": "6개월 내 달성할 목표·행동 한 문장"\n  }\n}`;
      const nRes=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({question:nPrompt,system:'K푸드 수출 전략 전문가. JSON 형식으로만 답변. 다른 텍스트 절대 금지. 모든 내용 한국어.'})});
      const nData=await nRes.json();
      const nRaw=(nData.answer||'').replace(/```json|```/g,'').trim();
      const nMatch=nRaw.match(/\{[\s\S]*\}/);
      if(nMatch) geminiData=JSON.parse(nMatch[0]);
    } catch(e3){console.log('전략 생성 실패:',e3.message);}
  } catch(e) {
    console.log('경쟁사 조회 실패, 기본 데이터 사용:', e.message);
  }

  clearInterval(iv);
  document.getElementById('ov')?.remove();

  try {
    showReport(aiComps, geminiData);
  } catch(e2) {
    console.log('진단서 생성 오류:', e2.message);
    document.getElementById('ov')?.remove();
    // 기본 데이터로 재시도
    try { showReport(null, null); } catch(e3) { console.log('재시도 실패:', e3.message); }
  }
}

function showReport(aiComps, geminiData) {
  const ck=getCatKey(), mk=getMktKey();
  const def=DEF[ck]||DEF.sauce;
  const pname=st.pname||st.cat||'내 제품';
  const parsePnum=(priceStr)=>{
    if(!priceStr) return def.psweet;
    if(priceStr.includes('이상')) return parseInt(priceStr.replace(/[^0-9]/g,''))||def.psweet;
    if(priceStr.includes('이하')) return parseInt(priceStr.replace(/[^0-9]/g,'').slice(0,2))||def.psweet;
    if(priceStr.includes('~')){const parts=priceStr.split('~');return parseInt(parts[parts.length-1].replace(/[^0-9]/g,''))||def.psweet;}
    return parseInt(priceStr.replace(/[^0-9]/g,''))||def.psweet;
  };
  const pnum=parsePnum(st.price);
  const now=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

  // 제품 키워드 배지 (헤더용)
  const aiSum=(window._productSummary||'').trim();
  const fallbackSum=(st.pdetail||'').trim();
  let shownSummary=aiSum;
  if(!shownSummary&&fallbackSum){
    shownSummary=fallbackSum.split(/[,，·、]/).map(s=>s.trim()).filter(s=>s&&s.length<=20).slice(0,6).join(' · ');
    if(!shownSummary) shownSummary=fallbackSum.slice(0,50)+(fallbackSum.length>50?'…':'');
  }

  // 성장률 추출 (mktAnalysis에서 +X.X% 패턴)
  const growthMatches=(def.mktAnalysis||'').match(/\+[\d.]+%/g);
  const growthRate=growthMatches?growthMatches[0]:null;

  // Gemini 데이터 폴백
  const oneLiner=(geminiData&&geminiData.summary)||`${pname}은 ${st.mkt||'목표 시장'}에서 K푸드 열풍과 함께 유망한 수출 기회를 가지고 있어요. 차별화된 스토리와 현지 바이어 네트워크 구축으로 진입하세요.`;
  const positioning=(geminiData&&geminiData.positioning)||'';
  const roadmap=(geminiData&&geminiData.roadmap)||{
    month1:def.action||'KATI(global.at.or.kr)에서 수출업체 등록 및 아마존 셀러 계정을 개설하세요.',
    month3:'경쟁사 분석을 마치고 첫 제품 샘플을 아마존에 등록하세요.',
    month6:'리뷰 50개 이상을 목표로 마케팅을 강화하고 유통 채널을 확대하세요.',
  };

  // 경쟁사
  const isAiComp=aiComps&&aiComps.length>0;
  const myProduct={n:`내 제품 (${pname})`,p:'$'+pnum,st:'K정통·만능',wk:'신규브랜드',detail:'차별화 스토리로 프리미엄 포지셔닝',insight:'위 경쟁사 분석을 바탕으로 차별화 전략을 수립하세요.'};
  const comps=isAiComp?[...aiComps,myProduct]:[...def.comp,myProduct];

  const catEmoji={sauce:'🫙',kim:'🌿',ramen:'🍜',snack:'🍪',health:'💊',beverage:'🥤',seafood:'🐟'};
  const fallbackEmoji=catEmoji[ck]||'🍽️';

  // 경쟁사 테이블
  const compHtml=`<table class="ctable">
    <thead><tr><th style="width:40px;"></th><th>브랜드</th><th>가격</th><th>강점</th><th>약점</th><th>리뷰</th></tr></thead>
    <tbody>${comps.map((c,i)=>{
      const isMe=i===comps.length-1;
      const hasDetail=c.detail;
      const detailId='cd'+i;
      const rowStyle=isMe?'background:rgba(249,115,22,0.05);border-top:1px solid rgba(249,115,22,0.2);':'';
      const rowCursor=hasDetail?'cursor:pointer;':'';
      const imgHtml=isMe
        ?`<td style="text-align:center;font-size:16px;width:44px;min-width:44px;">👑</td>`
        :`<td style="padding:4px 6px;text-align:center;width:44px;min-width:44px;max-width:44px;overflow:hidden;">
            <img id="comp-img-${i}" src="" style="display:none;width:36px;height:36px;min-width:36px;max-width:36px;object-fit:contain;border-radius:5px;background:#fff;border:1px solid rgba(255,255,255,0.06);" onerror="this.style.display='none';document.getElementById('comp-emoji-${i}').style.display='inline';">
            <span id="comp-emoji-${i}" style="font-size:18px;">${fallbackEmoji}</span>
           </td>`;
      return `<tr style="${rowStyle}${rowCursor}" ${hasDetail?`onclick="toggleDetail('${detailId}')"`:''}>
        ${imgHtml}
        <td style="font-weight:${isMe?700:400};color:${isMe?'var(--ac2)':'var(--tx)'};">${c.n}${hasDetail?' <span style="font-size:11px;color:var(--mt);">▼</span>':''}</td>
        <td style="font-family:'JetBrains Mono',monospace;color:var(--gn);">${c.p}</td>
        <td><span class="badge bg">${c.st}</span></td>
        <td><span class="badge br">${c.wk}</span></td>
        <td style="font-size:12px;color:var(--mt);">${c.rating||''}</td>
      </tr>
      ${hasDetail?`<tr id="${detailId}" style="display:none;">
        <td colspan="6" style="padding:0;">
          <div style="padding:13px 16px;background:rgba(255,255,255,0.02);border-top:1px solid var(--bd);">
            <div style="font-size:13px;color:var(--mt);margin-bottom:5px;">${c.rating||''} · 리뷰 ${c.reviews||''}</div>
            <div style="font-size:14px;color:var(--tx);line-height:1.75;margin-bottom:8px;">${c.detail||''}</div>
            <div style="font-size:13px;padding:8px 12px;background:rgba(249,115,22,0.06);border-radius:5px;border-left:2px solid var(--ac);color:var(--ac2);line-height:1.6;">💡 ${c.insight||''}</div>
          </div>
        </td>
      </tr>`:''}`;
    }).join('')}</tbody></table>
  <div style="font-size:12px;color:var(--mt);padding:8px 12px;">▼ 경쟁사 이름을 클릭하면 상세 정보를 볼 수 있어요</div>`;

  window.toggleDetail=(id)=>{const el=document.getElementById(id);if(el) el.style.display=el.style.display==='none'?'table-row':'none';};

  // 로드맵 카드
  const roadmapHtml=[
    {period:'1개월',icon:'🌱',content:roadmap.month1,color:'var(--gn)'},
    {period:'3개월',icon:'📦',content:roadmap.month3,color:'var(--yw)'},
    {period:'6개월',icon:'🚀',content:roadmap.month6,color:'var(--ac)'},
  ].map(r=>`
    <div style="display:flex;gap:14px;align-items:flex-start;padding:14px 16px;background:var(--s2);border-radius:10px;border-left:3px solid ${r.color};">
      <div style="flex-shrink:0;text-align:center;width:48px;">
        <div style="font-size:20px;">${r.icon}</div>
        <div style="font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:${r.color};margin-top:2px;">${r.period}</div>
      </div>
      <div style="font-size:14px;color:var(--tx);line-height:1.7;padding-top:3px;">${r.content}</div>
    </div>`).join('');

  const modal=document.createElement('div');
  modal.className='modal'; modal.id='modal';
  modal.innerHTML=`<div class="mcard">
    <div class="mhd">
      <div class="mlogo">AICON NAVI · K푸드 수출 진단서</div>
      <div class="mtitle">${pname}</div>
      <div class="msub">${st.mkt} 진출 분석 · ${now}</div>
      ${shownSummary?`<div style="font-size:13px;color:var(--mt);margin-top:6px;padding:6px 12px;background:var(--s2);border-radius:5px;display:inline-block;">${shownSummary}</div>`:''}
    </div>

    <div class="msec">
      <div class="msectitle">💡 한 줄 요약</div>
      <div class="msecbody" style="font-size:15px;font-weight:600;line-height:1.7;border-left:3px solid var(--ac);background:rgba(249,115,22,0.04);">${oneLiner}</div>
    </div>

    <div class="msec">
      <div class="msectitle">📈 ${st.mkt} 시장 규모</div>
      <div style="background:var(--s2);border-radius:8px;padding:16px;">
        ${growthRate?`<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bd);">
          <div style="flex-shrink:0;text-align:center;min-width:72px;">
            <div style="font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--gn);line-height:1;">${growthRate}</div>
            <div style="font-size:11px;color:var(--mt);margin-top:3px;">연간 성장률</div>
          </div>
          <div style="width:1px;height:52px;background:var(--bd2);flex-shrink:0;"></div>
          <div style="font-size:14px;color:var(--tx);line-height:1.75;">${def.mktAnalysis}</div>
        </div>`:`<div style="font-size:14px;color:var(--tx);line-height:1.75;margin-bottom:14px;">${def.mktAnalysis}</div>`}
        ${def.caution?`<div style="font-size:13px;color:var(--rd);padding:10px 12px;background:rgba(248,113,113,0.06);border-radius:6px;border-left:2px solid var(--rd);line-height:1.6;">⚠️ ${def.caution}</div>`:''}
      </div>
    </div>

    <div class="msec">
      <div class="msectitle">🏆 경쟁사 분석 ${isAiComp?'<span style="font-size:11px;padding:2px 7px;border-radius:3px;background:rgba(34,211,168,0.1);color:var(--gn);margin-left:4px;">Gemini 실시간 조회</span>':'<span style="font-size:11px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,0.06);color:var(--mt);margin-left:4px;">기본 데이터</span>'}</div>
      <div style="background:var(--s2);border-radius:8px;overflow:hidden;">${compHtml}</div>
      ${positioning?`<div style="margin-top:10px;padding:13px 16px;background:rgba(249,115,22,0.04);border:1px solid rgba(249,115,22,0.2);border-radius:8px;line-height:1.7;">
        <div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ac);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;">🎯 포지셔닝 전략</div>
        <div style="font-size:14px;color:var(--tx);">${positioning}</div>
      </div>`:''}
    </div>

    <div class="msec">
      <div class="msectitle">🚀 지금 당장 할 일 3단계</div>
      <div style="display:flex;flex-direction:column;gap:10px;">${roadmapHtml}</div>
    </div>

    <div class="mactions">
      <button class="mdl" onclick="dlReport()">⬇ 진단서 다운로드</button>
      <button class="mclose" onclick="document.getElementById('modal').remove()">닫기</button>
    </div>
  </div>`;

  document.body.appendChild(modal);
  window._RD={pname,def,pnum,now,mk,ck,comps,isAiComp,shownSummary,growthRate,oneLiner,positioning,roadmap,geminiData};

  // 경쟁사 이미지 백그라운드 로드
  const imgComps=window._imgComps;
  const imgKey=window._imgKey;
  window._imgComps=null; window._imgKey=null;

  if(imgComps&&imgKey){
    setTimeout(async()=>{
      for(let i=0;i<imgComps.length;i++){
        const comp=imgComps[i];
        if(!comp.imageQuery) continue;
        try{
          const q=`${comp.imageQuery} amazon.com product image`;
          const iRes=await fetch('https://google.serper.dev/images',{method:'POST',headers:{'X-API-KEY':imgKey,'Content-Type':'application/json'},body:JSON.stringify({q,gl:'us',hl:'en',num:5})});
          const iData=await iRes.json();
          const imgs=(iData.images||[]).filter(img=>img.imageUrl);
          if(imgs.length>0){
            const modal=document.getElementById('modal');
            if(!modal) continue;
            const imgEl=modal.querySelector(`#comp-img-${i}`);
            const emojiEl=modal.querySelector(`#comp-emoji-${i}`);
            if(imgEl){imgEl.src=imgs[0].imageUrl;imgEl.style.display='block';if(emojiEl) emojiEl.style.display='none';}
          }
        }catch(e){}
        await new Promise(r=>setTimeout(r,300));
      }
    },1200);
  }

  saveHistory({pname,def,pnum,now,mk,ck,comps,isAiComp,aiComps,geminiData});

  setTimeout(()=>{
    const chat=document.getElementById('chat');
    const div=document.createElement('div');
    div.className='msg ai';
    div.innerHTML=`<div class="av ai">🍜</div>
      <div style="flex:1;">
        <div class="bbl" style="background:var(--s2);border:1px solid var(--bd2);border-radius:4px 14px 14px 14px;">
          진단서가 완성됐어요! 📋<br>
          <span style="font-size:11px;color:var(--mt);">다른 제품이나 다른 나라도 진단해보세요.</span>
        </div>
        <div style="display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;">
          <button onclick="startNew()" style="padding:8px 14px;border-radius:8px;background:var(--ac);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">🆕 다른 제품 진단</button>
          <button onclick="showHistoryModal(loadHistory())" style="padding:8px 14px;border-radius:8px;background:transparent;border:1px solid var(--bd2);color:var(--mt);font-size:12px;cursor:pointer;">📂 내 진단 히스토리</button>
        </div>
      </div>`;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
  },500);
}

function dlReport() {
  const {pname,def,pnum,now,comps,shownSummary,growthRate,oneLiner,positioning,roadmap}=window._RD;

  const compRows=comps.map((c,i)=>{
    const isMe=i===comps.length-1;
    return `<tr style="${isMe?'background:#fff7ed;border-top:2px solid #fed7aa;':''}">
      <td style="font-weight:${isMe?700:400};color:${isMe?'#c2410c':'#1f2937'};">${isMe?'👑 ':''}${c.n}</td>
      <td style="font-family:monospace;color:#059669;font-size:13px;">${c.p}</td>
      <td><span style="display:inline-block;font-size:11px;padding:2px 7px;border-radius:3px;background:#dcfce7;color:#16a34a;">${c.st}</span></td>
      <td><span style="display:inline-block;font-size:11px;padding:2px 7px;border-radius:3px;background:#fee2e2;color:#dc2626;">${c.wk}</span></td>
      <td style="font-size:12px;color:#6b7280;">${c.rating||''}</td>
    </tr>
    ${c.detail?`<tr style="${isMe?'background:#fffbf7;':'background:#fafafa;'}">
      <td colspan="5" style="padding:10px 14px;border-bottom:1px solid #f3f4f6;">
        <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">${c.rating||''} · 리뷰 ${c.reviews||''}</div>
        <div style="font-size:13px;color:#374151;line-height:1.7;margin-bottom:6px;">${c.detail}</div>
        <div style="font-size:12px;padding:7px 12px;background:#fff7ed;border-left:3px solid #f97316;border-radius:3px;color:#92400e;">💡 ${c.insight||''}</div>
      </td>
    </tr>`:''}`;
  }).join('');

  const rm=[
    {cls:'rm-1',icon:'🌱',period:'1개월',content:roadmap.month1},
    {cls:'rm-3',icon:'📦',period:'3개월',content:roadmap.month3},
    {cls:'rm-6',icon:'🚀',period:'6개월',content:roadmap.month6},
  ].map(r=>`<div class="rm-card ${r.cls}"><div class="rm-icon">${r.icon}<div class="rm-period">${r.period}</div></div><div class="rm-content">${r.content}</div></div>`).join('');

  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<title>AICON NAVI 진단서 - ${pname}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;color:#1f2937;max-width:720px;margin:0 auto;padding:48px 40px;font-size:14px;}
.cover{background:linear-gradient(135deg,#07090e,#1a1200);color:#fff;padding:40px;border-radius:16px;margin-bottom:28px;}
.ct{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.cv{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;margin-bottom:4px;}
.cs{font-size:12px;color:rgba(255,255,255,.5);}
.cb{display:inline-block;margin-top:10px;font-size:12px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);padding:4px 12px;border-radius:20px;}
.sec{margin-bottom:24px;}
.stl{font-size:10px;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;font-weight:600;}
.card{background:#f9fafb;border-radius:10px;padding:18px 20px;border:1px solid #e5e7eb;}
.oneliner{font-size:16px;font-weight:600;line-height:1.7;border-left:4px solid #f97316;background:#fff7ed;padding:16px 20px;border-radius:0 10px 10px 0;}
.growth-row{display:flex;align-items:center;gap:20px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #e5e7eb;}
.growth-num{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:#059669;line-height:1;}
.growth-lbl{font-size:11px;color:#6b7280;margin-top:3px;}
.divider{width:1px;height:52px;background:#e5e7eb;flex-shrink:0;}
.mkt-txt{font-size:14px;color:#374151;line-height:1.75;}
.caution{font-size:13px;color:#b45309;background:#fff7ed;border-left:3px solid #f97316;padding:10px 14px;border-radius:0 6px 6px 0;margin-top:12px;line-height:1.6;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;color:#9ca3af;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:2px solid #e5e7eb;}
.tbl td{padding:9px 10px;font-size:13px;border-bottom:1px solid #f3f4f6;}
.tbl tr:last-child td{border-bottom:none;}
.pos-box{margin-top:14px;padding:14px 18px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;line-height:1.7;}
.pos-lbl{font-size:10px;font-family:'JetBrains Mono',monospace;color:#f97316;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.pos-txt{font-size:14px;color:#374151;}
.rm-card{display:flex;gap:16px;align-items:flex-start;padding:16px 18px;border-radius:10px;border-left:4px solid;margin-bottom:12px;}
.rm-1{background:#f0fdf4;border-color:#22c55e;}
.rm-3{background:#fefce8;border-color:#eab308;}
.rm-6{background:#fff7ed;border-color:#f97316;}
.rm-icon{font-size:22px;flex-shrink:0;text-align:center;width:50px;}
.rm-period{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;margin-top:3px;}
.rm-1 .rm-period{color:#16a34a;}.rm-3 .rm-period{color:#ca8a04;}.rm-6 .rm-period{color:#ea580c;}
.rm-content{font-size:14px;color:#374151;line-height:1.7;padding-top:2px;}
.ft{margin-top:32px;padding-top:16px;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af;display:flex;justify-content:space-between;}
</style></head><body>

<div class="cover">
  <div class="ct">AICON NAVI · K푸드 수출 진단서</div>
  <div class="cv">${pname}</div>
  <div class="cs">${st.mkt} 진출 분석 · ${now}</div>
  ${shownSummary?`<div class="cb">${shownSummary}</div>`:''}
</div>

<div class="sec">
  <div class="stl">💡 한 줄 요약</div>
  <div class="oneliner">${oneLiner}</div>
</div>

<div class="sec">
  <div class="stl">📈 ${st.mkt} 시장 규모</div>
  <div class="card">
    ${growthRate?`<div class="growth-row">
      <div style="flex-shrink:0;text-align:center;">
        <div class="growth-num">${growthRate}</div>
        <div class="growth-lbl">연간 성장률</div>
      </div>
      <div class="divider"></div>
      <div class="mkt-txt">${def.mktAnalysis}</div>
    </div>`:`<div class="mkt-txt" style="margin-bottom:0;">${def.mktAnalysis}</div>`}
    ${def.caution?`<div class="caution">⚠️ ${def.caution}</div>`:''}
  </div>
</div>

<div class="sec">
  <div class="stl">🏆 경쟁사 분석</div>
  <div class="card" style="padding:0;overflow:hidden;">
    <table class="tbl">
      <thead><tr><th>브랜드</th><th>가격</th><th>강점</th><th>약점</th><th>리뷰</th></tr></thead>
      <tbody>${compRows}</tbody>
    </table>
  </div>
  ${positioning?`<div class="pos-box"><div class="pos-lbl">🎯 포지셔닝 전략</div><div class="pos-txt">${positioning}</div></div>`:''}
</div>

<div class="sec">
  <div class="stl">🚀 지금 당장 할 일 3단계</div>
  ${rm}
</div>

<div class="ft">
  <span>AICON NAVI · K푸드 수출 분석 플랫폼</span>
  <span>${now}</span>
</div>
</body></html>`;

  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'}));
  a.download='AICON_NAVI_진단서_'+pname+'_'+new Date().toISOString().slice(0,10)+'.html';
  a.click();
}

function showSerperSetting() {
  const existing = localStorage.getItem('serper_key') || '';
  const modal = document.createElement('div');
  modal.className = 'modal'; modal.id = 'serper-modal';
  modal.innerHTML = `<div class="mcard" style="max-width:400px;">
    <div class="mhd">
      <div class="mlogo">실시간 경쟁사 검색 설정</div>
      <div class="mtitle" style="font-size:18px;">Serper API 키</div>
      <div class="msub">키가 있으면 아마존 실시간 검색으로 정확한 경쟁사를 찾아요</div>
    </div>
    <div style="font-size:12px;color:var(--mt);margin-bottom:10px;">
      👉 <a href="https://serper.dev" target="_blank" style="color:var(--ac);">serper.dev</a>에서 무료 발급 (월 2,500회 무료)
    </div>
    <input id="serper-input" type="password" placeholder="Serper API 키 입력..." value="${existing}"
      style="width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;margin-bottom:12px;">
    <div style="display:flex;gap:8px;">
      <button onclick="saveSerperKey()" style="flex:1;padding:10px;border-radius:8px;background:var(--ac);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">저장</button>
      <button onclick="document.getElementById('serper-modal').remove()" style="padding:10px 14px;border-radius:8px;background:transparent;border:1px solid var(--bd2);color:var(--mt);font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;">닫기</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  document.getElementById('serper-input').focus();
}

function saveSerperKey() {
  const key = document.getElementById('serper-input').value.trim();
  const btn = document.getElementById('serper-btn');
  if (key) {
    localStorage.setItem('serper_key', key);
    if (btn) { btn.textContent='🔍 Serper ✓'; btn.style.color='var(--gn)'; btn.style.borderColor='rgba(34,211,168,0.3)'; }
  } else {
    localStorage.removeItem('serper_key');
    if (btn) { btn.textContent='🔍 Serper'; btn.style.color='var(--mt)'; btn.style.borderColor=''; }
  }
  document.getElementById('serper-modal').remove();
}

document.addEventListener('DOMContentLoaded', async ()=>{
  if (localStorage.getItem('serper_key')) {
    setTimeout(()=>{
      const btn = document.getElementById('serper-btn');
      if (btn) { btn.textContent='🔍 Serper ✓'; btn.style.color='var(--gn)'; btn.style.borderColor='rgba(34,211,168,0.3)'; }
    }, 100);
  }

  // ── Sheets에서 DEF 데이터 로드 시도
  const sheetsData = await loadFromSheets();
  if (sheetsData && Object.keys(sheetsData).length > 0) {
    Object.assign(DEF, sheetsData);
    console.log('✅ Sheets DB 로드됨:', Object.keys(sheetsData));
  }

  // ── 히스토리 불러오기
  const history = loadHistory();

  if (history.length > 0) {
    // 재방문 사용자
    const last = history[0];
    addMsg('ai', `다시 오셨군요! 반가워요 🍜\n\n지난번에 **${last.pname}** (${last.mkt}) 진단하셨는데, 결과가 **${last.score}점**이었어요.\n\n새 제품 진단을 하시겠어요, 아니면 지난 진단서를 다시 보시겠어요?`, [
      {icon:'🆕', label:'새 제품 진단하기', val:'new', desc:'다른 제품으로 새로 시작'},
      {icon:'📋', label:'지난 진단서 보기', val:'history', desc:`${last.pname} · ${last.mkt}`},
    ]);
  } else {
    // 첫 방문
    addMsg('ai', '안녕하세요! **K-Food Market** 수출 AI 어드바이저예요 🍜\n\n<span style="font-size:11px;color:var(--mt);background:var(--s2);padding:3px 10px;border-radius:20px;border:1px solid var(--bd2);">📊 정부 공식 수출 통계 기반 · 실제 아마존 경쟁사 분석</span>\n\n수출이 처음이셔도 괜찮아요. 제가 단계별로 안내해드릴게요.\n\n**어떤 제품**을 해외에 팔고 싶으세요?', CATS);
  }
});

// ── 히스토리 저장·불러오기
function saveHistory(report) {
  const item = {
    pname: st.pname||st.cat,
    mkt: st.mkt,
    price: st.price,
    score: DEF[getCatKey()]?.score || 80,
    date: new Date().toLocaleDateString('ko-KR'),
    report: report
  };
  const history = loadHistory();
  history.unshift(item);
  // 최근 5개만 유지
  localStorage.setItem('kfood_history', JSON.stringify(history.slice(0,5)));
}

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem('kfood_history')||'[]');
  } catch(e) { return []; }
}

// ── 히스토리 선택 처리
function onHistoryChoice(val) {
  if (val === 'new') {
    // 새로 시작
    document.getElementById('chat').innerHTML = '';
    Object.assign(st, {step:0,cat:null,mkt:null,price:null,pname:null,pdetail:null,log:[],typing:false});
    setStep(0);
    addMsg('ai','좋아요! 새 제품 진단을 시작할게요.\n\n**어떤 제품**을 해외에 팔고 싶으세요?', CATS);
  } else if (val === 'history') {
    const history = loadHistory();
    if (history.length > 0) showHistoryModal(history);
  }
}

// ── 히스토리 모달
function showHistoryModal(history) {
  const modal = document.createElement('div');
  modal.className = 'modal'; modal.id = 'history-modal';
  modal.innerHTML = `<div class="mcard" style="max-width:480px;">
    <div class="mhd">
      <div class="mlogo">내 진단 히스토리</div>
      <div class="mtitle" style="font-size:18px;">이전 진단서</div>
      <div class="msub">최근 5개까지 저장돼요</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">
      ${history.map((h,i)=>`
        <div onclick="showSavedReport(${i})" style="background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--ac)'" onmouseout="this.style.borderColor='var(--bd2)'">
          <div>
            <div style="font-weight:700;font-size:13px;margin-bottom:2px;">${h.pname}</div>
            <div style="font-size:11px;color:var(--mt);">${h.mkt} · ${h.price} · ${h.date}</div>
          </div>
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--gn);">${h.score}</div>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="startNew()" style="flex:1;padding:10px;border-radius:8px;background:var(--ac);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🆕 새 제품 진단</button>
      <button onclick="document.getElementById('history-modal').remove()" style="padding:10px 14px;border-radius:8px;background:transparent;border:1px solid var(--bd2);color:var(--mt);font-size:13px;cursor:pointer;">닫기</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function showSavedReport(idx) {
  document.getElementById('history-modal')?.remove();
  const history = loadHistory();
  const h = history[idx];
  if (h && h.report) {
    // 저장된 state 복원
    st.pname = h.pname; st.mkt = h.mkt; st.price = h.price;
    window._RD = h.report;
    showReport(h.report.aiComps||null, h.report.geminiData||null);
  }
}

function startNew() {
  document.getElementById('history-modal')?.remove();
  document.getElementById('chat').innerHTML = '';
  Object.assign(st, {step:0,cat:null,mkt:null,price:null,pname:null,pdetail:null,log:[],typing:false});
  setStep(0);
  addMsg('ai','새 제품 진단을 시작할게요!\n\n**어떤 제품**을 해외에 팔고 싶으세요?', CATS);
}
</script>
</body>
</html>
