<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리뷰레이더 — 경쟁사·리뷰 AI 분석</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;
  --ac:#ff6b35;--ac2:#ff8c5a;--gn:#00d4a0;--gn2:#00f0b5;
  --bl:#4a90e2;--bl2:#6ba8f0;--pu:#9b59b6;--pu2:#b47fd4;
  --tx:#e8e8f0;--tx2:#a0a0b8;--tx3:#606078;
  --bd:#2a2a3a;--bd2:#3a3a4e;
  --warn:#f0c040;--warn2:#ffe066;
  --rd:#e84444;
  --r:12px;--r2:8px;--r3:20px;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --sh2:0 8px 40px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;min-height:100vh;line-height:1.6}
a{color:var(--ac);text-decoration:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* HEADER */
.site-header{
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
  border-bottom:1px solid var(--bd);
  padding:18px 24px;
  display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px);
}
.logo{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  background:linear-gradient(135deg,var(--ac),var(--warn2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.5px;
}
.logo-badge{
  background:var(--ac);color:#fff;
  font-size:9px;font-weight:700;letter-spacing:1px;
  padding:2px 6px;border-radius:4px;
  vertical-align:super;margin-left:4px;
  -webkit-text-fill-color:#fff;
}
.logo-sub{font-size:13px;color:var(--tx2);margin-left:4px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-link{
  font-size:13px;color:var(--tx2);padding:6px 14px;
  border:1px solid var(--bd);border-radius:20px;
  transition:all .2s;cursor:pointer;
}
.nav-link:hover{border-color:var(--ac);color:var(--ac)}

/* HERO */
.hero{
  text-align:center;padding:64px 24px 40px;
  background:radial-gradient(ellipse at 50% 0%, rgba(255,107,53,.08) 0%, transparent 70%);
}
.hero-tag{
  display:inline-block;
  background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);
  color:var(--ac2);font-size:12px;font-weight:700;letter-spacing:2px;
  padding:5px 16px;border-radius:20px;margin-bottom:20px;
}
.hero h1{
  font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,48px);
  font-weight:800;line-height:1.15;margin-bottom:16px;
}
.hero h1 span{
  background:linear-gradient(135deg,var(--ac),var(--warn2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-desc{font-size:16px;color:var(--tx2);max-width:560px;margin:0 auto 40px}

/* FORM CARD */
.form-card{
  max-width:720px;margin:0 auto 48px;
  background:var(--bg2);border:1px solid var(--bd);
  border-radius:var(--r);padding:32px;
  box-shadow:var(--sh);
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:500;color:var(--tx2);letter-spacing:.3px}
.field label span{color:var(--ac);margin-left:2px}
.field input,.field select,.field textarea{
  background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);
  color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:15px;
  padding:12px 14px;outline:none;transition:border-color .2s,box-shadow .2s;
  width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--ac);box-shadow:0 0 0 3px rgba(255,107,53,.15);
}
.field input::placeholder,.field textarea::placeholder{color:var(--tx3)}
.field textarea{resize:vertical;min-height:80px}
.field select option{background:var(--bg3)}
.field-full{grid-column:1/-1}
.form-note{font-size:12px;color:var(--tx3);margin-top:6px}

.run-btn{
  width:100%;padding:16px;margin-top:8px;
  background:linear-gradient(135deg,var(--ac),#e05520);
  color:#fff;font-family:'Noto Sans KR',sans-serif;
  font-size:16px;font-weight:700;letter-spacing:.5px;
  border:none;border-radius:var(--r2);cursor:pointer;
  transition:all .3s;box-shadow:0 4px 20px rgba(255,107,53,.4);
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.run-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,107,53,.6)}
.run-btn:active{transform:translateY(0)}
.run-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.run-icon{font-size:20px}

/* LOADING OVERLAY */
.overlay{
  position:fixed;inset:0;background:rgba(10,10,15,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(6px);gap:20px;
}
.spinner{
  width:56px;height:56px;border-radius:50%;
  border:3px solid var(--bd2);border-top-color:var(--ac);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-msg{font-size:16px;color:var(--tx);text-align:center;max-width:340px}
.overlay-step{
  font-size:13px;color:var(--tx2);
  background:var(--bg2);border:1px solid var(--bd);
  padding:8px 18px;border-radius:20px;
}

/* RESULTS CONTAINER */
.results{max-width:900px;margin:0 auto;padding:0 20px 80px}
.section-title{
  display:flex;align-items:center;gap:10px;
  font-size:19px;font-weight:700;margin-bottom:20px;
  padding-bottom:12px;border-bottom:1px solid var(--bd);
}
.section-icon{font-size:22px}

/* SUMMARY BAR */
.summary-bar{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--bd);border-radius:var(--r);
  padding:24px 28px;margin-bottom:28px;
  box-shadow:var(--sh);
}
.summary-bar h2{
  font-size:22px;font-weight:700;margin-bottom:6px;
  background:linear-gradient(135deg,var(--tx),var(--ac2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.summary-bar .sub{font-size:14px;color:var(--tx2);margin-bottom:16px}
.meta-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;
  border:1px solid;letter-spacing:.3px;
}
.chip-ac{color:var(--ac2);border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.1)}
.chip-gn{color:var(--gn2);border-color:rgba(0,212,160,.4);background:rgba(0,212,160,.1)}
.chip-bl{color:var(--bl2);border-color:rgba(74,144,226,.4);background:rgba(74,144,226,.1)}
.chip-warn{color:var(--warn2);border-color:rgba(240,192,64,.4);background:rgba(240,192,64,.1)}
.chip-pu{color:var(--pu2);border-color:rgba(155,89,182,.4);background:rgba(155,89,182,.1)}

/* COMPETITOR CARDS */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:28px}
.comp-card{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:0;transition:border-color .2s,transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.comp-img{
  width:100%;height:160px;background:var(--bg3) center/cover no-repeat;
  border-bottom:1px solid var(--bd);position:relative;
}
.comp-img.no-img{
  display:flex;align-items:center;justify-content:center;
  color:var(--tx3);font-size:32px;
}
.comp-body{padding:18px}
.comp-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--sh)}
.comp-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--ac),var(--warn2));
  opacity:0;transition:opacity .2s;
}
.comp-card:hover::before{opacity:1}
.comp-rank{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:600;color:var(--tx3);
  margin-bottom:8px;letter-spacing:1px;
}
.comp-name{font-size:16px;font-weight:700;margin-bottom:4px;color:var(--tx)}
.comp-meta{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.comp-price{
  font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--gn2);
}
.comp-rating{font-size:13px;color:var(--warn2)}
.comp-reviews{font-size:12px;color:var(--tx3)}
.comp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.comp-tag{
  font-size:11px;padding:3px 9px;border-radius:12px;
  background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2);
}
.comp-strength{
  font-size:13px;color:var(--tx);
  padding:10px 12px;border-radius:var(--r2);
  background:rgba(0,212,160,.07);border-left:3px solid var(--gn);
  margin-bottom:8px;
}
.comp-weakness{
  font-size:13px;color:var(--tx);
  padding:10px 12px;border-radius:var(--r2);
  background:rgba(232,68,68,.07);border-left:3px solid var(--rd);
}
.comp-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;opacity:.7}

/* SENTIMENT PANEL */
.sentiment-panel{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;
}
@media(max-width:640px){.sentiment-panel{grid-template-columns:1fr}}
.sentiment-card{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;
}
.sentiment-card.pos{border-top:3px solid var(--gn)}
.sentiment-card.neg{border-top:3px solid var(--rd)}
.sentiment-title{
  display:flex;align-items:center;gap:8px;
  font-size:15px;font-weight:700;margin-bottom:16px;
}
.sent-icon{font-size:18px}
.pattern-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.pattern-item{
  display:flex;align-items:flex-start;gap:8px;
  font-size:14px;color:var(--tx);
  padding:8px 10px;border-radius:var(--r2);
  background:var(--bg3);
}
.pattern-bullet{
  width:20px;height:20px;min-width:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;margin-top:1px;
}
.pos .pattern-bullet{background:rgba(0,212,160,.2);color:var(--gn2)}
.neg .pattern-bullet{background:rgba(232,68,68,.2);color:#ff7070}

/* SENTIMENT METER */
.sentiment-meter{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:24px;margin-bottom:28px;
}
.meter-title{font-size:15px;font-weight:700;margin-bottom:16px}
.meter-bar-wrap{display:flex;border-radius:6px;overflow:hidden;height:28px;gap:2px;margin-bottom:10px}
.meter-seg{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .5s}
.meter-seg.pos-seg{background:var(--gn);color:#000}
.meter-seg.neu-seg{background:var(--tx3);color:var(--tx)}
.meter-seg.neg-seg{background:var(--rd);color:#fff}
.meter-legend{display:flex;gap:20px;font-size:13px;color:var(--tx2)}
.meter-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px}

/* INSIGHT BOX */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
@media(max-width:640px){.insight-grid{grid-template-columns:1fr}}
.insight-card{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;
}
.insight-head{font-size:14px;font-weight:700;color:var(--tx2);margin-bottom:12px;letter-spacing:.3px}
.keyword-cloud{display:flex;flex-wrap:wrap;gap:8px}
.kw{
  font-size:13px;padding:5px 12px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--bd2);color:var(--tx);
  transition:all .2s;cursor:default;
}
.kw:hover{border-color:var(--ac);color:var(--ac2);background:rgba(255,107,53,.1)}
.kw.big{font-size:15px;font-weight:700;border-color:var(--ac);color:var(--ac2);background:rgba(255,107,53,.12)}
.kw.med{font-size:14px;font-weight:600}

/* STRATEGY BOX */
.strategy-box{
  background:linear-gradient(135deg,rgba(255,107,53,.06),rgba(240,192,64,.04));
  border:1px solid rgba(255,107,53,.25);border-radius:var(--r);
  padding:28px;margin-bottom:28px;
}
.strategy-box h3{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--ac2)}
.strategy-text{font-size:15px;color:var(--tx);line-height:1.8;margin-bottom:20px}
.diff-points{display:flex;flex-direction:column;gap:10px}
.diff-point{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;border-radius:var(--r2);
  background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.15);
}
.diff-num{
  width:26px;height:26px;min-width:26px;border-radius:50%;
  background:var(--ac);color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.diff-text{font-size:14px;color:var(--tx);line-height:1.6}

/* PRICE INSIGHT */
.price-insight{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:24px;margin-bottom:28px;
  border-left:4px solid var(--gn);
}
.price-insight h3{font-size:15px;font-weight:700;color:var(--gn2);margin-bottom:10px}
.price-insight p{font-size:14px;color:var(--tx);line-height:1.7}

/* MARKET GAP */
.gap-box{
  background:linear-gradient(135deg,rgba(0,212,160,.06),rgba(74,144,226,.04));
  border:1px solid rgba(0,212,160,.25);border-radius:var(--r);
  padding:24px;margin-bottom:28px;
}
.gap-box h3{font-size:15px;font-weight:700;color:var(--gn2);margin-bottom:10px}
.gap-box p{font-size:14px;color:var(--tx);line-height:1.7}

/* HISTORY */
.hist-section{max-width:900px;margin:0 auto;padding:0 20px 60px}
.hist-section h2{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--tx2)}
.hist-list{display:flex;flex-direction:column;gap:8px}
.hist-item{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);
  padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:border-color .2s;
}
.hist-item:hover{border-color:var(--ac)}
.hist-product{font-size:14px;font-weight:600;color:var(--tx)}
.hist-meta{font-size:12px;color:var(--tx3);margin-left:auto}

/* TOAST */
.toast{
  position:fixed;bottom:28px;right:28px;
  background:var(--bg3);border:1px solid var(--bd2);
  border-radius:var(--r2);padding:12px 20px;
  font-size:14px;color:var(--tx);box-shadow:var(--sh2);
  z-index:999;animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* DOWNLOAD BTN */
.dl-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--bd2);
  color:var(--tx);font-family:'Noto Sans KR',sans-serif;
  font-size:14px;font-weight:600;padding:10px 20px;
  border-radius:var(--r2);cursor:pointer;transition:all .2s;
  margin-bottom:28px;
}
.dl-btn:hover{border-color:var(--ac);color:var(--ac)}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <span class="logo">리뷰레이더<span class="logo-badge">AI</span></span>
    <span class="logo-sub">경쟁사·리뷰 인텔리전스</span>
  </div>
  <div class="header-right">
    <a href="food_ask.html" class="nav-link">시장규모 분석 →</a>
  </div>
</header>

<section class="hero">
  <div class="hero-tag">COMPETITOR &amp; REVIEW INTELLIGENCE</div>
  <h1>아마존 <span>경쟁사 리뷰</span>를<br>AI로 해부합니다</h1>
  <p class="hero-desc">실시간 아마존 리뷰 데이터를 수집해 경쟁사의 강점·약점·소비자 불만을 AI가 분석합니다. K-Food 수출 전략 수립에 바로 활용하세요.</p>
</section>

<div style="max-width:720px;margin:0 auto;padding:0 20px">
  <div class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>분석할 제품명 <span>*</span></label>
        <input id="inp-product" type="text" placeholder="예: 김치, 라면, 고추장, 김스낵">
      </div>
      <div class="field">
        <label>카테고리 <span>*</span></label>
        <select id="inp-category">
          <option value="">선택하세요</option>
          <option value="noodles">라면·면류</option>
          <option value="kimchi">김치·발효식품</option>
          <option value="snacks">스낵·과자</option>
          <option value="sauces">소스·양념</option>
          <option value="rice">쌀·곡류</option>
          <option value="seafood">수산물·해조류</option>
          <option value="drinks">음료·차</option>
          <option value="frozen">냉동식품</option>
          <option value="health">건강식품·보충제</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="field">
        <label>타겟 시장 <span>*</span></label>
        <select id="inp-market">
          <option value="">선택하세요</option>
          <option value="USA">미국 (Amazon.com)</option>
          <option value="Japan">일본 (Amazon.co.jp)</option>
          <option value="UK">영국 (Amazon.co.uk)</option>
          <option value="Germany">독일 (Amazon.de)</option>
          <option value="Canada">캐나다 (Amazon.ca)</option>
          <option value="Australia">호주</option>
          <option value="Singapore">싱가포르</option>
          <option value="Southeast Asia">동남아시아</option>
        </select>
      </div>
      <div class="field">
        <label>내 브랜드명 (선택)</label>
        <input id="inp-brand" type="text" placeholder="예: 오뚜기, CJ, 농심">
      </div>
      <div class="field field-full">
        <label>제품 특징·USP (선택)</label>
        <textarea id="inp-detail" placeholder="예: 유기농 재료, 비건 인증, 글루텐프리, 전통 레시피 등 차별점을 입력하세요"></textarea>
        <p class="form-note">입력할수록 더 정밀한 경쟁사 비교 및 차별화 전략을 제안합니다.</p>
      </div>
    </div>
    <button class="run-btn" id="run-btn" onclick="runAnalysis()">
      <span class="run-icon">🔍</span>
      경쟁사·리뷰 AI 분석 시작
    </button>
  </div>
</div>

<div id="results-wrap"></div>

<div class="hist-section" id="hist-wrap" style="display:none">
  <h2>최근 분석 기록</h2>
  <div class="hist-list" id="hist-list"></div>
</div>

<script>
const PROXY = 'https://script.google.com/macros/s/AKfycbxaJlOYRXBbhKSCz0GJ41-Rhm07hT59EM9Cn0hSQgoD0RGumZDkz8vDO21hlTYVGFkYzA/exec';
const SERPER_KEY = '7636913fe6dd5b2a71e1d35597f6d3ab182ef41f';

const STEPS = [
  '🔎 아마존 실시간 검색 중...',
  '📦 경쟁 제품 목록 수집 중...',
  '🧠 리뷰 패턴 AI 분석 중...',
  '📊 경쟁 포지셔닝 분석 중...',
  '✅ 분석 완료!'
];

const CAT_KW={
  noodles:['noodle','ramen','ramyun','udon','soba','pasta','vermicelli'],
  kimchi:['kimchi','kimchee','fermented','cabbage','radish','pickle'],
  snacks:['snack','chip','cracker','cookie','biscuit','seaweed snack','rice cracker','puffed'],
  sauces:['sauce','paste','gochujang','doenjang','ssamjang','marinade','seasoning','chili','pepper'],

  frozen:['frozen','dumpling','mandu','gyoza','meal kit','hotteok'],
  health:['supplement','vitamin','probiotic','collagen','protein','extract'],
  other:[]
};
const AMAZON_HOST={USA:'amazon.com',Japan:'amazon.co.jp',UK:'amazon.co.uk',Germany:'amazon.de',Canada:'amazon.ca',Australia:'amazon.com.au',Singapore:'amazon.sg','Southeast Asia':'amazon.com'};

const KNOWN_BRANDS=['Bibigo','CJ','Nongshim','Ottogi','Sempio','Samyang','Wang','Pulmuone','Chung Jung One','Jongga','Jayone','Haitai','Lotte','Crown','Binggrae','Dongwon','Daesang','Sajo','Shirakiku','Annie Chun','Nasoya','Kikkoman','House Foods','Maruchan','Nissin','Paldo','Surasang','GimMe','Gimme','Roland','Kimnori','Yopokki','Choripdong','Assi','Wando','O\'Food'];
const STOP_WORDS=/^(best|top|buy|shop|new|cheap|sale|free|get|for|the|a|an|amazon|com|korean|asian|japanese|chinese|thai|organic|natural|premium|fresh|delicious|authentic|traditional|dried|frozen|pack|set|bulk|value|original|gourmet|healthy|spicy|sweet|crispy|crunchy|easy|quick|instant|home|family|low|high|wild|pure|real|true|good|great|special)/i;

function isTitleRelevant(title, category){
  const kws=CAT_KW[category]||[];
  if(!kws.length) return true;
  const tl=title.toLowerCase();
  return kws.some(function(k){return tl.includes(k);});
}

function extractBrand(title){
  let t=title.replace(/\s*[-–—|:]\s*(amazon|walmart|target|ebay|instacart|kroger|costco).*$/i,'')
    .replace(/\s*\(.*?\)\s*$/,'').replace(/\s*[,;.].*$/,'').trim();
  for(const b of KNOWN_BRANDS){
    if(new RegExp('(^|\\s)'+b.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(t)) return b;
  }
  const byMatch=t.match(/\bby\s+([A-Z][A-Za-z0-9'&]+(?:\s+[A-Z][A-Za-z0-9'&]+)?)/);
  if(byMatch) return byMatch[1];
  const words=t.split(/\s+/);
  if(!words.length) return null;
  const w1=words[0],w2=words[1]||'';
  if(STOP_WORDS.test(w1)||!/^[A-Z]/.test(w1)) return null;
  if(w2&&/^[A-Z]/.test(w2)&&!STOP_WORDS.test(w2)) return w1+' '+w2;
  return w1;
}

function isGenericTerm(s){
  return !s||s.length<2||STOP_WORDS.test(s.trim())||/^[a-z]/.test(s.trim());
}

function extractCompetitorsFromSerper(sr1,sr2,shopData,category){
  const seen=new Set(),results=[];
  const shoppingAll=[...(shopData?.shopping||[]),...(sr1?.shopping||[]),...(sr2?.shopping||[])];
  const amazonShop=shoppingAll.filter(function(it){
    const src=(it.source||it.seller||'').toLowerCase();
    return src==='amazon'||src==='amazon.com';
  });
  for(const item of amazonShop){
    if(results.length>=6) break;
    const title=(item.title||'').trim();
    if(!title||!isTitleRelevant(title,category)) continue;
    const brand=extractBrand(title);
    if(!brand||isGenericTerm(brand)) continue;
    const key=brand.toLowerCase().replace(/\s+/g,'');
    if(seen.has(key)) continue;
    seen.add(key);
    results.push({
      name:brand,
      productTitle:title,
      price:item.price||null,
      rating:item.rating||null,
      reviewCount:item.ratingCount?(item.ratingCount+'건+'):null,
      imageUrl:item.imageUrl||null,
      link:item.link||null,
      _src:'shop'
    });
  }
  if(results.length<3){
    const allShop=shoppingAll.filter(function(it){
      return isTitleRelevant((it.title||''),category);
    });
    for(const item of allShop){
      if(results.length>=6) break;
      const title=(item.title||'').trim();
      if(!title) continue;
      const brand=extractBrand(title);
      if(!brand||isGenericTerm(brand)) continue;
      const key=brand.toLowerCase().replace(/\s+/g,'');
      if(seen.has(key)) continue;
      seen.add(key);
      results.push({
        name:brand,productTitle:title,
        price:item.price||null,rating:item.rating||null,
        reviewCount:item.ratingCount?(item.ratingCount+'건+'):null,
        imageUrl:item.imageUrl||null,link:item.link||null,_src:'shop-any'
      });
    }
  }
  return results;
}

function mergeCompetitorData(serperComps,aiData,product,market,brand){
  const aiComps=aiData?.competitors||[];
  let finalComps;
  if(serperComps.length>0){
    finalComps=serperComps.map(function(sc,i){
      const scFirst=sc.name.toLowerCase().split(' ')[0];
      const aiComp=aiComps.find(function(ac){
        const acName=(ac.name||'').toLowerCase();
        return acName.includes(scFirst)||scFirst.includes(acName.split(' ')[0]);
      })||aiComps[i]||{};
      return {
        name:sc.name,
        price:sc.price||aiComp.price||'가격 정보 없음',
        rating:sc.rating||aiComp.rating||null,
        reviewCount:sc.reviewCount||aiComp.reviewCount||null,
        country:aiComp.country||'',
        targetCustomer:aiComp.targetCustomer||'',
        strength:aiComp.strength||'',
        weakness:aiComp.weakness||'',
        tags:aiComp.tags||[],
        imageUrl:sc.imageUrl||null
      };
    });
  } else {
    finalComps=aiComps.length>0?aiComps:null;
  }
  const fb=buildFallbackData(product,market,brand);
  return {
    competitors:finalComps||fb.competitors,
    positivePatterns:aiData?.positivePatterns||fb.positivePatterns,
    negativePatterns:aiData?.negativePatterns||fb.negativePatterns,
    buyingTriggers:aiData?.buyingTriggers||fb.buyingTriggers,
    painPoints:aiData?.painPoints||fb.painPoints,
    overallSentiment:aiData?.overallSentiment||fb.overallSentiment,
    marketGap:aiData?.marketGap||fb.marketGap,
    entryStrategy:aiData?.entryStrategy||fb.entryStrategy,
    differentiationPoints:aiData?.differentiationPoints||fb.differentiationPoints,
    priceInsight:aiData?.priceInsight||fb.priceInsight,
    topKeywords:aiData?.topKeywords||fb.topKeywords,
    riskKeywords:aiData?.riskKeywords||fb.riskKeywords
  };
}

async function runAnalysis(){
  const product=document.getElementById('inp-product').value.trim();

  const market=document.getElementById('inp-market').value;
  const brand=document.getElementById('inp-brand').value.trim();
  const detail=document.getElementById('inp-detail').value.trim();

  if(!product){showToast('⚠️ 제품명을 입력해주세요');return;}
  if(!category){showToast('⚠️ 카테고리를 선택해주세요');return;}
  if(!market){showToast('⚠️ 타겟 시장을 선택해주세요');return;}

  document.getElementById('run-btn').disabled=true;
  showOverlay('<strong>'+product+'</strong> 경쟁사·리뷰 분석을 시작합니다');

  let iv=0, stepIdx=0;
  iv=setInterval(function(){
    if(stepIdx<STEPS.length-1) stepIdx++;
    setStep(STEPS[stepIdx]);
  },2800);

  try {
    setStep(STEPS[0]);
    const catEn=CAT_EN[category]||category;
    const q1='korean '+catEn+' amazon buy';
    const q2=catEn+' korean food amazon best seller';
    const qShop='korean '+catEn;

    const [sr1,sr2,shopData]=await Promise.all([
      serperSearch(q1).catch(()=>null),
      serperSearch(q2).catch(()=>null),
      serperShoppingSearch(qShop).catch(()=>null)
    ]);

    setStep(STEPS[1]);
    const serperComps=extractCompetitorsFromSerper(sr1,sr2,shopData,category);

    const snip1=extractSnippets(sr1,6);
    const snip2=extractSnippets(sr2,6);
    const allSnippets=[...new Set([...snip1,...snip2])].join('\n\n');

    setStep(STEPS[2]);
    const prompt=buildPrompt(product,category,market,brand,detail,allSnippets,serperComps);
    let raw='';
    try{raw=await geminiCall(prompt);}
    catch(ge){console.warn('Gemini failed, using Serper data only:',ge);}

    setStep(STEPS[3]);
    let aiData=null;
    if(raw){
      const match=raw.match(/\{[\s\S]*\}/);
      if(match){
        try{aiData=JSON.parse(match[0]);}catch(e){
          const cleaned=match[0].replace(/[\x00-\x1F\x7F]/g,' ').replace(/,(\s*[}\]])/g,'$1');
          try{aiData=JSON.parse(cleaned);}catch(e2){}
        }
      }
    }

    const data=mergeCompetitorData(serperComps,aiData,product,market,brand);
    data._isFallback=!aiData;
    data._serperFound=serperComps.length;

    setStep('🖼️ 제품 이미지 검색 중...');
    await enrichCompetitorImages(data.competitors,product,catEn);

    clearInterval(iv);
    setStep(STEPS[4]);
    await new Promise(function(r){setTimeout(r,400);});
    removeOverlay();
    document.getElementById('run-btn').disabled=false;

    renderResults({product,category,market,brand,detail,data});
    saveHistory({product,category,market,brand,data,time:Date.now()});
    renderHistory();

    if(data._isFallback && serperComps.length===0){
      showToast('⚠️ AI 분석 서버 응답 없음 — 기본 템플릿 표시 중. 잠시 후 재시도해보세요.',5000);
    } else if(data._isFallback){
      showToast('ℹ️ 경쟁사는 실제 검색 결과 기반입니다. AI 인사이트는 기본값으로 표시됩니다.',4500);
    }

  } catch(e){
    clearInterval(iv);
    removeOverlay();
    document.getElementById('run-btn').disabled=false;
    showToast('❌ 분석 중 오류가 발생했습니다. 다시 시도해주세요.');
    console.error(e);
  }
}

function extractSnippets(sr, max){
  if(!sr) return [];
  const out=[];
  const items=[...(sr.organic||[]), ...(sr.answerBox?[sr.answerBox]:[])]
  for(let i=0;i<Math.min(max,items.length);i++){
    const t=items[i].title||'';
    const s=items[i].snippet||items[i].answer||'';
    if(t||s) out.push('['+t+'] '+s);
  }
  return out;
}

  const pains=data.painPoints||[];

  const marketLabel={'USA':'미국','Japan':'일본','UK':'영국','Germany':'독일','Canada':'캐나다','Australia':'호주','Singapore':'싱가포르','Southeast Asia':'동남아시아'}[market]||market;

  window._RR = {product,category,market,marketLabel,brand,detail,data,dateStr};

  const compCards = comps.map(function(c,i){
    const stars='⭐'.repeat(Math.round(c.rating||4));
    const tags=(c.tags||[]).map(function(t){return '<span class="comp-tag">'+t+'</span>';}).join('');
    const imgHtml = c.imageUrl
      ? '<div class="comp-img" style="background-image:url(\''+c.imageUrl+'\')" ></div>'
      : '<div class="comp-img no-img">📦</div>';
    return '<div class="comp-card">'
      +imgHtml
      +'<div class="comp-body">'
      +'<div class="comp-rank">#'+(i+1)+' 경쟁사</div>'
      +'<div class="comp-name">'+(c.name||'경쟁사')+'</div>'
      +'<div class="comp-meta">'
        +'<span class="comp-price">'+(c.price||'가격 미상')+'</span>'
        +'<span class="comp-rating">'+stars+' '+(c.rating||'?')+'</span>'
        +'<span class="comp-reviews">'+(c.reviewCount||'')+'</span>'
      +'</div>'
      +'<div class="comp-tags">'+tags+(c.country?'<span class="comp-tag">'+c.country+'</span>':'')+'</div>'
      +'<div class="comp-strength"><div class="comp-label">💪 강점</div>'+(c.strength||'')+'</div>'
      +'<div style="height:8px"></div>'
      +'<div class="comp-weakness"><div class="comp-label">⚠️ 약점·불만</div>'+(c.weakness||'')+'</div>'
      +(c.targetCustomer?'<div style="margin-top:10px;font-size:12px;color:var(--tx3)">🎯 타겟: '+c.targetCustomer+'</div>':'')
      +'</div>'
      +'</div>';
  }).join('');

  const posItems=posP.map(function(p,i){
    return '<li class="pattern-item"><span class="pattern-bullet">'+(i+1)+'</span><span>'+p+'</span></li>';
  }).join('');

  const negItems=negP.map(function(p,i){
    return '<li class="pattern-item"><span class="pattern-bullet">'+(i+1)+'</span><span>'+p+'</span></li>';
  }).join('');

  const kwHtml=kws.map(function(k,i){
    return '<span class="kw'+(i<2?' big':i<5?' med':'')+'">'+k+'</span>';
  }).join('');
  const riskHtml=risks.map(function(r){return '<span class="kw">'+r+'</span>';}).join('');
  const triggerHtml=triggers.map(function(t){return '<span class="kw">'+t+'</span>';}).join('');
  const painHtml=pains.map(function(p){return '<span class="kw">'+p+'</span>';}).join('');

  const diffHtml=diffs.map(function(d,i){
    return '<div class="diff-point"><span class="diff-num">'+(i+1)+'</span><span class="diff-text">'+d+'</span></div>';
  }).join('');

  const html=
  '<div class="results" id="results">'
  +'<div class="summary-bar">'
    +'<h2>'+product+' · '+marketLabel+' 경쟁사 분석</h2>'
    +'<div class="sub">'+dateStr+' 기준 AI 분석 결과</div>'
    +'<div class="meta-chips">'
      +(brand?'<span class="chip chip-ac">내 브랜드: '+brand+'</span>':'')
      +'<span class="chip chip-gn">'+marketLabel+' 시장</span>'
      +'<span class="chip chip-bl">'+comps.length+'개 경쟁사 분석</span>'
      +'<span class="chip chip-warn">리뷰 감성 '+pos+'% 긍정</span>'
      +(detail?'<span class="chip chip-pu">USP 분석 포함</span>':'')
      +(data._isFallback?'<span class="chip" style="color:#ffb340;border-color:rgba(255,179,64,.5);background:rgba(255,179,64,.1)">⚠️ AI 응답 실패 — 기본 템플릿</span>':'')
    +'</div>'
  +'</div>'
  +'<div class="action-row">'
    +'<button class="dl-btn" onclick="downloadReport()">📥 분석 보고서 다운로드</button>'
    +'<button class="dl-btn" onclick="window.scrollTo({top:0,behavior:\'smooth\'});">⬆️ 맨 위로</button>'
  +'</div>'
  +'<div class="section-title"><span class="section-icon">🏆</span> 경쟁사 분석 ('+comps.length+'개)</div>'
  +'<div class="comp-grid">'+compCards+'</div>'
  +'<div class="section-title"><span class="section-icon">💬</span> 리뷰 감성 분석</div>'
  +'<div class="sentiment-meter">'
    +'<div class="meter-title">전체 리뷰 감성 분포</div>'
    +'<div class="meter-bar-wrap">'
      +'<div class="meter-seg pos-seg" style="flex:'+pos+'">'+pos+'% 긍정</div>'
      +'<div class="meter-seg neu-seg" style="flex:'+neu+'">'+neu+'%</div>'
      +'<div class="meter-seg neg-seg" style="flex:'+neg+'">'+neg+'% 부정</div>'
    +'</div>'
    +'<div class="meter-legend">'
      +'<span><span class="meter-dot" style="background:var(--gn)"></span>긍정 '+pos+'%</span>'
      +'<span><span class="meter-dot" style="background:var(--tx3)"></span>중립 '+neu+'%</span>'
      +'<span><span class="meter-dot" style="background:var(--rd)"></span>부정 '+neg+'%</span>'
    +'</div>'
  +'</div>'
  +'<div class="sentiment-panel">'
    +'<div class="sentiment-card pos">'
      +'<div class="sentiment-title"><span class="sent-icon">👍</span> 5★ 리뷰 패턴</div>'
      +'<ul class="pattern-list">'+posItems+'</ul>'
    +'</div>'
    +'<div class="sentiment-card neg">'
      +'<div class="sentiment-title"><span class="sent-icon">👎</span> 1★ 불만 패턴</div>'
      +'<ul class="pattern-list">'+negItems+'</ul>'
    +'</div>'
  +'</div>'
  +'<div class="section-title"><span class="section-icon">🔑</span> 소비자 인사이트</div>'
  +'<div class="insight-grid">'
    +'<div class="insight-card"><div class="insight-head">✅ 긍정 키워드</div><div class="keyword-cloud">'+kwHtml+'</div></div>'
    +'<div class="insight-card"><div class="insight-head">⚠️ 리스크 키워드</div><div class="keyword-cloud">'+riskHtml+'</div></div>'
    +'<div class="insight-card"><div class="insight-head">🛒 구매 결정 요인</div><div class="keyword-cloud">'+triggerHtml+'</div></div>'
    +'<div class="insight-card"><div class="insight-head">😤 소비자 불편사항</div><div class="keyword-cloud">'+painHtml+'</div></div>'
  +'</div>'
  +'<div class="section-title"><span class="section-icon">🌊</span> 시장 갭 &amp; 진입 기회</div>'
  +'<div class="gap-box"><h3>📍 시장 갭 분석</h3><p>'+(data.marketGap||'시장 갭 분석 데이터를 불러오는 중입니다.')+'</p></div>'
  +'<div class="section-title"><span class="section-icon">💰</span> 가격 전략 인사이트</div>'
  +'<div class="price-insight"><h3>💡 가격 포지셔닝 제안</h3><p>'+(data.priceInsight||'가격 전략 데이터를 불러오는 중입니다.')+'</p></div>'
  +'<div class="section-title"><span class="section-icon">🚀</span> K-Food 차별화 전략</div>'
  +'<div class="strategy-box"><h3>📋 시장 진입 전략</h3><p class="strategy-text">'+(data.entryStrategy||'')+'</p><div class="diff-points">'+diffHtml+'</div></div>'
  +'</div>';

  document.getElementById('results-wrap').innerHTML=html;
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function downloadReport(){
  const d=window._RR;
  if(!d){showToast('분석 결과가 없습니다.');return;}
  const product=d.product, marketLabel=d.marketLabel, brand=d.brand, data=d.data, dateStr=d.dateStr;
  const comps=data.competitors||[];
  const pos=data.overallSentiment?.positive||65;
  const neu=data.overallSentiment?.neutral||18;
  const neg=data.overallSentiment?.negative||17;

  const compRows=comps.map(function(c,i){
    const imgCell = c.imageUrl
      ? '<img src="'+c.imageUrl+'" style="width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid #eee">'
      : '<div style="width:64px;height:64px;background:#f0f0f0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#aaa">📦</div>';
    return '<tr><td>#'+(i+1)+'</td><td>'+imgCell+'</td><td><strong>'+(c.name||'')+'</strong>'+(c.country?' ('+c.country+')':'')+'</td><td>'+(c.price||'')+'</td><td>⭐'+(c.rating||'')+' / '+(c.reviewCount||'')+'</td><td style="color:#00d4a0">'+(c.strength||'')+'</td><td style="color:#e84444">'+(c.weakness||'')+'</td></tr>';
  }).join('');

  const posItems=(data.positivePatterns||[]).map(function(p){return '<li>'+p+'</li>';}).join('');
  const negItems=(data.negativePatterns||[]).map(function(p){return '<li>'+p+'</li>';}).join('');
  const diffItems=(data.differentiationPoints||[]).map(function(d,i){return '<li><strong>'+(i+1)+'.</strong> '+d+'</li>';}).join('');

  const html='<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">'
    +'<title>리뷰레이더 분석 보고서 — '+product+'</title>'
    +'<style>body{font-family:\'Malgun Gothic\',sans-serif;background:#f5f5f5;color:#222;margin:0;padding:32px}.wrap{max-width:900px;margin:0 auto;background:#fff;border-radius:12px;padding:40px;box-shadow:0 4px 24px rgba(0,0,0,.1)}h1{color:#ff6b35;font-size:24px;margin-bottom:4px}.sub{color:#888;font-size:13px;margin-bottom:28px}h2{font-size:16px;color:#333;border-bottom:2px solid #ff6b35;padding-bottom:6px;margin:28px 0 14px}table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:20px}th{background:#ff6b35;color:#fff;padding:10px 8px;text-align:left}td{padding:9px 8px;border-bottom:1px solid #eee;vertical-align:top}tr:nth-child(even) td{background:#fafafa}.sent-row{display:flex;gap:20px;margin-bottom:20px}.sent-box{flex:1;padding:16px;border-radius:8px;font-size:13px}.pos-box{background:#e8faf5;border-left:4px solid #00d4a0}.neg-box{background:#fdf0f0;border-left:4px solid #e84444}.sent-box h3{font-size:14px;margin:0 0 10px}ul{margin:8px 0 0;padding-left:18px;line-height:1.8}.strategy{background:#fff8f5;border:1px solid #ffccaa;border-radius:8px;padding:20px;margin-bottom:20px}.gap-box{background:#f0fff8;border:1px solid #99eedd;border-radius:8px;padding:20px;margin-bottom:20px}.price-box{background:#f8fff0;border-left:4px solid #00d4a0;padding:16px;margin-bottom:20px}.footer{text-align:center;color:#aaa;font-size:12px;margin-top:32px;border-top:1px solid #eee;padding-top:16px}.bar-wrap{display:flex;border-radius:4px;overflow:hidden;height:22px;margin-bottom:8px}.bar-pos{background:#00d4a0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex:'+pos+'}.bar-neu{background:#aaa;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex:'+neu+'}.bar-neg{background:#e84444;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex:'+neg+'}</style></head>'
    +'<body><div class="wrap">'
    +'<h1>🔍 리뷰레이더 분석 보고서</h1>'
    +'<div class="sub">제품: <strong>'+product+'</strong> | 시장: <strong>'+marketLabel+'</strong>'+(brand?' | 브랜드: <strong>'+brand+'</strong>':'')+' | 분석일: '+dateStr+'</div>'
    +'<h2>🏆 경쟁사 분석 ('+comps.length+'개)</h2>'
    +'<table><tr><th>#</th><th>이미지</th><th>브랜드</th><th>가격</th><th>평점/리뷰</th><th>강점</th><th>약점·불만</th></tr>'+compRows+'</table>'
    +'<h2>💬 리뷰 감성 분포</h2>'
    +'<div class="bar-wrap"><div class="bar-pos">'+pos+'% 긍정</div><div class="bar-neu">'+neu+'%</div><div class="bar-neg">'+neg+'% 부정</div></div>'
    +'<div class="sent-row"><div class="sent-box pos-box"><h3>👍 5★ 리뷰 패턴</h3><ul>'+posItems+'</ul></div><div class="sent-box neg-box"><h3>👎 1★ 불만 패턴</h3><ul>'+negItems+'</ul></div></div>'
    +'<h2>🌊 시장 갭 &amp; 진입 기회</h2><div class="gap-box"><p>'+(data.marketGap||'')+'</p></div>'
    +'<h2>💰 가격 전략 인사이트</h2><div class="price-box"><p>'+(data.priceInsight||'')+'</p></div>'
    +'<h2>🚀 K-Food 차별화 전략</h2><div class="strategy"><p style="margin-bottom:14px">'+(data.entryStrategy||'')+'</p><ul>'+diffItems+'</ul></div>'
    +'<div class="footer">리뷰레이더 (ReviewRadar) · AI 분석 결과 · '+dateStr+'<br>본 보고서는 AI 분석 결과이며 실제 시장 상황과 다를 수 있습니다.</div>'
    +'</div></body></html>';

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='리뷰레이더_'+product+'_'+marketLabel+'_'+dateStr+'.html';
  a.click();URL.revokeObjectURL(url);
  showToast('📥 보고서 다운로드 완료!');
}

/* ---- HISTORY ---- */
const HIST_KEY='rr_history';
function saveHistory(item){
  const arr=getHistory();
  arr.unshift(item);
  if(arr.length>10) arr.length=10;
  try{localStorage.setItem(HIST_KEY,JSON.stringify(arr));}catch(e){}
}
function getHistory(){
  try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch(e){return [];}
}
function renderHistory(){
  const arr=getHistory();
  const wrap=document.getElementById('hist-wrap');
  const list=document.getElementById('hist-list');
  if(!arr.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  list.innerHTML=arr.map(function(h,i){
    const mktLabel={'USA':'미국','Japan':'일본','UK':'영국','Germany':'독일','Canada':'캐나다','Australia':'호주','Singapore':'싱가포르','Southeast Asia':'동남아시아'}[h.market]||h.market;
    const d=new Date(h.time);
    const ds=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    return '<div class="hist-item" onclick="replayHistory('+i+'")>'
      +'<span class="hist-product">📦 '+h.product+'</span>'
      +'<span class="chip chip-gn" style="font-size:11px">'+mktLabel+'</span>'
      +(h.brand?'<span class="chip chip-ac" style="font-size:11px">'+h.brand+'</span>':'')
      +'<span class="hist-meta">'+ds+'</span>'
      +'</div>';
  }).join('');
}
function replayHistory(i){
  const arr=getHistory();
  const h=arr[i];
  if(!h)return;
  document.getElementById('inp-product').value=h.product||'';
  document.getElementById('inp-category').value=h.category||'';
  document.getElementById('inp-market').value=h.market||'';
  document.getElementById('inp-brand').value=h.brand||'';
  renderResults({product:h.product,category:h.category,market:h.market,brand:h.brand,detail:'',data:h.data});
  window.scrollTo({top:0,behavior:'smooth'});
  showToast('📂 이전 분석 결과를 불러왔습니다');
}

renderHistory();
</script>
